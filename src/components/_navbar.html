<script>
    document.addEventListener('DOMContentLoaded', () => {
        const navbar = document.getElementById('nexaNavbar');
        const navContainer = document.getElementById('navContainer');
        const scrollProgress = document.getElementById('scrollProgress');
        const mobileBtn = document.getElementById('mobileMenuBtn');
        const mobileMenu = document.getElementById('mobileMenu');
        const mobileLinks = document.querySelectorAll('.mobile-link');
        const toggleIcon = document.getElementById('menuToggleIcon');

        // 1. SCROLL DYNAMICS
        window.addEventListener('scroll', () => {
            const currentScroll = window.scrollY;
            const docHeight = document.documentElement.scrollHeight - window.innerHeight;
            const scrolled = (currentScroll / docHeight) * 100;

            // Progress Bar Update
            scrollProgress.style.width = `${scrolled}%`;

            // Navbar Visual Shift
            if (currentScroll > 50) {
                navbar.classList.add('bg-white/80', 'backdrop-blur-2xl', 'shadow-2xl', 'border-gray-100');
                navbar.classList.remove('border-transparent');
                navContainer.classList.add('py-2');
                navContainer.classList.remove('py-4');
            } else {
                navbar.classList.remove('bg-white/80', 'backdrop-blur-2xl', 'shadow-2xl', 'border-gray-100');
                navbar.classList.add('border-transparent');
                navContainer.classList.add('py-4');
                navContainer.classList.remove('py-2');
            }
        });

        // 2. MOBILE MENU LOGIC
        let isMenuOpen = false;
        mobileBtn.addEventListener('click', () => {
            isMenuOpen = !isMenuOpen;
            if (isMenuOpen) {
                mobileMenu.classList.remove('invisible', 'opacity-0');
                mobileMenu.classList.add('visible', 'opacity-100');
                toggleIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path>`;
                document.body.style.overflow = 'hidden';
            } else {
                mobileMenu.classList.add('invisible', 'opacity-0');
                mobileMenu.classList.remove('visible', 'opacity-100');
                toggleIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 8h16M4 16h16"></path>`;
                document.body.style.overflow = 'auto';
            }
        });

        // Close menu on link click
        mobileLinks.forEach(link => {
            link.addEventListener('click', () => {
                isMenuOpen = false;
                mobileMenu.classList.add('invisible', 'opacity-0');
                document.body.style.overflow = 'auto';
            });
        });

        // 3. ACTIVE LINK HIGHLIGHTER
        const activePath = window.location.pathname.split("/").pop();
        document.querySelectorAll('.nav-item').forEach(link => {
            if (link.getAttribute('href') === activePath) {
                link.classList.add('text-nexa-teal');
                link.classList.remove('text-nexa-navy/60');
                link.querySelector('span').style.width = '2rem';
            }
        });
    });
</script>
